name: Run cucumber test

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - uses: browser-actions/setup-edge@latest

      - run: mvn clean test